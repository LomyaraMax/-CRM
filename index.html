<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Стоматология - запись</title>

<style>
:root{
  --blue:#4BB6FF;
  --bg:#f5f9fc;
  --card:#fff;
  --text:#1e2a32;
  --border:#dbe6ee;
}

body{
  margin:0;
  font-family:Arial;
  background:var(--bg);
  color:var(--text);
}

header{
  background:white;
  padding:15px;
  text-align:center;
  font-weight:bold;
  border-bottom:1px solid var(--border);
}

.container{
  max-width:900px;
  margin:auto;
  padding:12px;
}

input[type="date"]{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:1px solid var(--border);
  font-size:16px;
}

/* slots */
.slots{
  margin-top:15px;
  display:grid;
  gap:10px;
}

.slot{
  background:white;
  padding:14px;
  border-radius:12px;
  border:1px solid var(--border);
  display:flex;
  justify-content:space-between;
  cursor:pointer;
}

.slot.booked{
  background:#ffe8e8;
  color:#b10000;
  cursor:not-allowed;
}

.slot.blocked{
  background:#e9eef2;
  color:#666;
}

/* modal */
.modal{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.5);
  display:none;
  justify-content:center;
  align-items:center;
}

.modal-content{
  background:white;
  padding:15px;
  border-radius:12px;
  width:90%;
  max-width:400px;
}

input,textarea{
  width:100%;
  margin-top:10px;
  padding:10px;
  border-radius:10px;
  border:1px solid var(--border);
}

button{
  width:100%;
  padding:12px;
  margin-top:10px;
  background:var(--blue);
  border:none;
  color:white;
  border-radius:10px;
  font-size:16px;
}

/* admin panel */
.admin-panel{
  margin-top:20px;
  background:white;
  padding:12px;
  border-radius:12px;
  border:1px solid var(--border);
}

.record{
  border-bottom:1px solid var(--border);
  padding:10px 0;
}

.small{
  font-size:12px;
  color:#666;
}
</style>
</head>

<body>

<header>🦷 Онлайн запись к стоматологу</header>

<div class="container">

<input type="date" id="date">

<div id="slots" class="slots"></div>

<button onclick="admin()">Админ панель</button>

<div class="admin-panel">
  <div class="small">Админ видит все записи</div>
  <div id="adminData"></div>
</div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-content">
    <h3>Запись</h3>
    <div id="timeText"></div>

    <input id="name" placeholder="Имя">
    <input id="phone" placeholder="Телефон">
    <textarea id="comment" placeholder="Комментарий"></textarea>

    <button onclick="save()">Записаться</button>
  </div>
</div>

<script>
let selectedDate="";
let selectedTime="";

document.getElementById("date").valueAsDate=new Date();

document.getElementById("date").addEventListener("change",()=>{
  selectedDate=document.getElementById("date").value;
  render();
  renderAdmin();
});

function slots(){
  let arr=[];
  for(let h=9;h<18;h++){
    arr.push(`${String(h).padStart(2,'0')}:00`);
    arr.push(`${String(h).padStart(2,'0')}:30`);
  }
  return arr;
}

function get(){
  return JSON.parse(localStorage.getItem("clinic")||"{}");
}

function set(d){
  localStorage.setItem("clinic",JSON.stringify(d));
}

function render(){
  let data=get();
  let day=data[selectedDate]||{booked:{},blocked:false};

  let el=document.getElementById("slots");
  el.innerHTML="";

  if(day.blocked){
    el.innerHTML="<div class='slot blocked'>🚫 Выходной день</div>";
    return;
  }

  slots().forEach(t=>{
    let div=document.createElement("div");
    div.className="slot";

    if(day.booked[t]){
      div.classList.add("booked");
      div.innerHTML=`<div>${t}</div><div>ЗАНЯТО</div>`;
    }else{
      div.innerHTML=`<div>${t}</div><div>СВОБОДНО</div>`;
      div.onclick=()=>open(t);
    }

    el.appendChild(div);
  });
}

function open(t){
  selectedTime=t;
  document.getElementById("timeText").innerText="Время: "+t;
  document.getElementById("modal").style.display="flex";
}

function save(){
  let d=get();
  if(!d[selectedDate]) d[selectedDate]={booked:{},blocked:false};

  d[selectedDate].booked[selectedTime]={
    name:document.getElementById("name").value,
    phone:document.getElementById("phone").value,
    comment:document.getElementById("comment").value
  };

  set(d);
  document.getElementById("modal").style.display="none";

  render();
  renderAdmin();
}

function admin(){
  let pass=prompt("Пароль админа:");
  if(pass!=="1234") return alert("Неверно");

  let action=prompt(
`1 - заблокировать день
2 - разблокировать день
3 - удалить запись`
  );

  let d=get();
  if(!d[selectedDate]) d[selectedDate]={booked:{},blocked:false};

  if(action==="1"){
    d[selectedDate].blocked=true;
  }

  if(action==="2"){
    d[selectedDate].blocked=false;
  }

  if(action==="3"){
    let t=prompt("Время (например 10:00)");
    delete d[selectedDate].booked[t];
  }

  set(d);
  render();
  renderAdmin();
}

function renderAdmin(){
  let d=get();
  let day=d[selectedDate]||{booked:{}};

  let el=document.getElementById("adminData");
  el.innerHTML="<h4>Записи:</h4>";

  if(!day.booked) return;

  Object.keys(day.booked).forEach(t=>{
    let r=day.booked[t];

    let div=document.createElement("div");
    div.className="record";
    div.innerHTML=`
      <b>${t}</b><br>
      ${r.name}<br>
      ${r.phone}<br>
      <span class="small">${r.comment}</span><br>
      <button onclick="del('${t}')">Удалить</button>
    `;
    el.appendChild(div);
  });
}

function del(t){
  let d=get();
  delete d[selectedDate].booked[t];
  set(d);
  render();
  renderAdmin();
}

selectedDate=document.getElementById("date").value;
render();
renderAdmin();
</script>

</body>
</html>
